name: Stagery spend poller

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Set to 1 to skip SNS publish'
        required: false
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DRY_RUN_INPUT: ${{ github.event.inputs.dry_run }}
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_STAGERY_API_PRD }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      SNS_TOPIC_ARN: ${{ secrets.SNS_TOPIC_ARN_STAGERY_SPEND }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/stagery-spend-poller/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/stagery-spend-poller/requirements.txt

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run poller
        run: |
          set -euo pipefail
          export RESEND_API_KEY="$(doppler secrets get RESEND_API_KEY --plain)"
          export DRY_RUN="${DRY_RUN_INPUT:-0}"
          : "${AWS_REGION:=us-east-1}"
          export AWS_REGION
          python3 scripts/stagery-spend-poller/poll.py
