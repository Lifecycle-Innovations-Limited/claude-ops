# Claude Ops Admin App — Full-scope Shopify admin template
# Generated by claude-ops /ops:setup ecom
# client_id is populated at install time by the setup wizard

client_id = ""

[access_scopes]
# All admin scopes — grants full read/write across the entire Shopify admin surface.
# Source: https://shopify.dev/docs/api/usage/access-scopes#authenticated-access-scopes
scopes = "read_products,write_products,read_product_listings,read_collection_listings,read_product_feeds,write_product_feeds,read_orders,write_orders,read_all_orders,read_draft_orders,write_draft_orders,read_order_edits,write_order_edits,read_returns,write_returns,read_checkouts,write_checkouts,read_customers,write_customers,read_customer_payment_methods,write_customer_payment_methods,read_inventory,write_inventory,read_locations,write_locations,read_fulfillments,write_fulfillments,read_assigned_fulfillment_orders,write_assigned_fulfillment_orders,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders,read_third_party_fulfillment_orders,write_third_party_fulfillment_orders,read_shipping,write_shipping,read_packing_slip_templates,write_packing_slip_templates,read_analytics,read_reports,read_marketing_events,write_marketing_events,read_price_rules,write_price_rules,read_discounts,write_discounts,read_discovery,write_discovery,read_gift_cards,write_gift_cards,read_themes,write_themes,read_content,write_content,read_online_store_pages,write_online_store_pages,read_online_store_navigation,write_online_store_navigation,read_legal_policies,write_legal_policies,read_files,write_files,read_script_tags,write_script_tags,read_pixels,write_pixels,read_custom_pixels,write_custom_pixels,read_publications,write_publications,read_translations,write_translations,read_locales,write_locales,read_markets,write_markets,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,read_purchase_options,write_purchase_options,read_payment_customizations,write_payment_customizations,read_payment_terms,write_payment_terms,read_delivery_customizations,write_delivery_customizations,read_cart_transforms,write_cart_transforms,read_validations,write_validations,read_resource_feedbacks,write_resource_feedbacks,read_store_credit_accounts,write_store_credit_accounts,read_store_credit_account_transactions,write_store_credit_account_transactions,read_shopify_payments_accounts,read_shopify_payments_bank_accounts,read_shopify_payments_payouts,read_shopify_payments_disputes"

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = ["orders/updated"]
  uri = "/webhooks/orders/updated"

  [[webhooks.subscriptions]]
  topics = ["products/update"]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = ["inventory_levels/update"]
  uri = "/webhooks/inventory/update"

  [[webhooks.subscriptions]]
  topics = ["fulfillments/create"]
  uri = "/webhooks/fulfillments/create"

  # Compliance webhooks (required for public apps)
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = ["customers/data_request"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = ["customers/redact"]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = ["shop/redact"]
